spring:
  application:
    name: payflow
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
  datasource:
    write:
      url: ${DB_WRITE_URL}
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      hikari:
        maximum-pool-size: 7
        minimum-idle: 2
        connection-timeout: 10000
    read:
      url: ${DB_READ_URL}
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      hikari:
        maximum-pool-size: 7
        minimum-idle: 2
        connection-timeout: 10000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
      properties:
        enable.idempotence: true
        acks: all
    consumer:
      group-id: payflow-${spring.profiles.active}
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

payflow:
  kafka:
    topics:
      transactions: transactions
    consumer:
      analytics-group: analytics-${spring.profiles.active}
      audit-group: audit-${spring.profiles.active}
  outbox:
    poll-interval-ms: 500
    batch-size: 100
    max-retries: 5
  retry:
    max-attempts: 3
    initial-interval-ms: 100
    multiplier: 2.0
    max-interval-ms: 1000

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 900000
    refresh-expiration: 604800000
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000}
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}

logging:
  level:
    com.payflow: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.apache.kafka: WARN
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}